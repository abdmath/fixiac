run:
  timeout: 5m
  tests: true
  go: '1.22'

linters:
  disable-all: true
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - typecheck

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unused
    - text: "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*Write.*). is not checked"
      linters:
        - errcheck
