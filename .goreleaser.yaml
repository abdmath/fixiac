nfpms:
  - id: fixiac
    package_name: fixiac
    vendor: abdmath
    homepage: https://github.com/abdmath/fixiac
    maintainer: abdmath
    description: "AI-native Terraform security remediation CLI"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
